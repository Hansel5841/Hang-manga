<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hangman</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@400;600&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #0d0a06;
    --paper:     #f0e2c0;
    --ink:       #1a1005;
    --red:       #b03020;
    --gold:      #d4a230;
    --gold-dim:  #7a5a18;
    --rope:      #7a5a18;
    --gallows:   #4a2e0a;
    --dim:       #6b5535;
    --glow:      #e8b840;
    --green:     #3a8a3a;
    --panel-bg:  rgba(20,14,4,0.85);
    --border:    rgba(212,162,48,0.3);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  @keyframes fadeIn    { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
  @keyframes shake     { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-7px)} 60%{transform:translateX(7px)} 80%{transform:translateX(-4px)} }
  @keyframes popIn     { 0%{transform:scale(0.6);opacity:0} 70%{transform:scale(1.15)} 100%{transform:scale(1);opacity:1} }
  @keyframes glimmer   { 0%,100%{opacity:.6} 50%{opacity:1} }
  @keyframes flicker   { 0%,100%{opacity:1} 45%{opacity:.85} 50%{opacity:.7} 55%{opacity:.9} }
  @keyframes ropeSwing { 0%,100%{transform-origin:top center;transform:rotate(0deg)} 25%{transform:rotate(3deg)} 75%{transform:rotate(-3deg)} }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Cinzel', serif;
    padding: 24px 16px 40px;
    overflow-x: hidden;
  }

  /* Atmospheric background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 50% 20%, rgba(180,100,20,0.06) 0%, transparent 70%),
      radial-gradient(ellipse 80% 60% at 50% 80%, rgba(10,5,0,0.8) 0%, transparent 80%),
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,200,80,.018) 39px, rgba(255,200,80,.018) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 59px, rgba(255,200,80,.012) 59px, rgba(255,200,80,.012) 60px);
    pointer-events: none;
    z-index: 0;
  }

  body > * { position: relative; z-index: 1; }

  /* ── Title ── */
  .title-wrap {
    text-align: center;
    margin-bottom: 28px;
  }

  h1 {
    font-family: 'Cinzel Decorative', cursive;
    font-size: clamp(2rem, 6vw, 3.8rem);
    color: var(--glow);
    letter-spacing: .12em;
    text-transform: uppercase;
    text-shadow:
      0 0 40px rgba(232,184,64,.5),
      0 0 80px rgba(232,184,64,.2),
      2px 3px 0 rgba(0,0,0,0.9);
    animation: flicker 6s ease-in-out infinite;
    line-height: 1;
  }

  .title-rule {
    width: 260px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 10px auto 0;
    opacity: .6;
  }

  /* ── Game layout ── */
  .game-wrap {
    display: flex;
    flex-wrap: wrap;
    gap: 28px;
    align-items: flex-start;
    justify-content: center;
    width: 100%;
    max-width: 960px;
  }

  /* ── Gallows panel ── */
  .gallows-panel {
    background: var(--panel-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 20px 18px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    box-shadow:
      inset 0 1px 0 rgba(255,220,100,.07),
      0 8px 40px rgba(0,0,0,.7),
      0 0 0 1px rgba(0,0,0,.4);
    position: relative;
    overflow: hidden;
  }

  .gallows-panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
    opacity: .5;
  }

  canvas#gallows { display: block; }

  /* Lives row */
  .lives-row {
    display: flex;
    gap: 6px;
    align-items: center;
    padding: 6px 12px;
    background: rgba(0,0,0,.3);
    border-radius: 20px;
    border: 1px solid rgba(212,162,48,.15);
  }
  .heart {
    font-size: 1.15rem;
    transition: opacity .35s, transform .35s, filter .35s;
    filter: drop-shadow(0 0 4px rgba(200,60,60,.5));
  }
  .heart.lost {
    opacity: .18;
    transform: scale(.75);
    filter: none;
  }

  /* ── Right panel ── */
  .right-panel {
    display: flex;
    flex-direction: column;
    gap: 22px;
    align-items: center;
    flex: 1;
    min-width: 280px;
  }

  /* ── Hint ── */
  .hint-text {
    color: var(--dim);
    font-family: 'Courier Prime', monospace;
    font-size: .9rem;
    letter-spacing: .06em;
    text-align: center;
    font-style: italic;
    padding: 8px 16px;
    border-left: 2px solid var(--gold-dim);
    background: rgba(212,162,48,.04);
  }

  /* ── Word display ── */
  .word-display {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .letter-slot {
    width: 38px;
    text-align: center;
  }
  .letter-slot .char {
    display: block;
    font-family: 'Courier Prime', monospace;
    font-size: 2.1rem;
    font-weight: 700;
    color: var(--paper);
    min-height: 2.5rem;
    letter-spacing: .04em;
    transition: color .25s, transform .25s;
    text-shadow: 0 0 12px rgba(240,226,192,.2);
  }
  .letter-slot .char.just-guessed {
    animation: popIn .35s ease forwards;
    color: var(--glow);
    text-shadow: 0 0 16px rgba(232,184,64,.6);
  }
  .letter-slot .char.wrong { color: var(--red); text-shadow: 0 0 10px rgba(176,48,32,.4); }
  .letter-slot hr {
    border: none;
    border-top: 2px solid var(--gold-dim);
    margin-top: 5px;
    opacity: .6;
    transition: border-color .25s, opacity .25s;
  }
  .letter-slot:has(.char:not(:empty)) hr {
    border-top-color: var(--gold);
    opacity: 1;
  }

  /* ── Wrong guesses ── */
  .wrong-section {
    text-align: center;
    background: rgba(176,48,32,.06);
    border: 1px solid rgba(176,48,32,.2);
    border-radius: 4px;
    padding: 10px 20px;
    min-width: 200px;
  }
  .wrong-label {
    color: var(--dim);
    font-size: .75rem;
    letter-spacing: .18em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .wrong-letters {
    font-family: 'Courier Prime', monospace;
    font-size: 1.3rem;
    color: var(--red);
    letter-spacing: .25em;
    min-height: 1.8rem;
    text-shadow: 0 0 10px rgba(176,48,32,.4);
  }

  /* ── Message ── */
  .message {
    font-size: 1.4rem;
    letter-spacing: .1em;
    text-align: center;
    animation: fadeIn .45s ease;
  }
  .message.win  { color: #5cbf5c; text-shadow: 0 0 24px rgba(92,191,92,.5); }
  .message.lose { color: var(--red); text-shadow: 0 0 24px rgba(176,48,32,.6); }

  /* ── Keyboard ── */
  .keyboard {
    display: flex;
    flex-direction: column;
    gap: 7px;
    align-items: center;
  }
  .kb-row { display: flex; gap: 7px; }

  .kb-key {
    width: 38px;
    height: 38px;
    border: 1px solid rgba(122,90,24,.6);
    border-radius: 4px;
    background: rgba(20,12,2,.6);
    color: var(--paper);
    font-family: 'Cinzel', serif;
    font-size: .85rem;
    cursor: pointer;
    transition: background .15s, color .15s, border-color .15s, transform .1s, box-shadow .15s;
    box-shadow: 0 2px 6px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,220,100,.06);
    position: relative;
    overflow: hidden;
  }
  .kb-key::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(255,255,255,.04) 0%, transparent 60%);
    pointer-events: none;
  }
  .kb-key:hover:not(:disabled) {
    background: var(--gold);
    color: var(--ink);
    border-color: var(--glow);
    transform: translateY(-3px);
    box-shadow: 0 6px 18px rgba(212,162,48,.35), inset 0 1px 0 rgba(255,255,255,.2);
  }
  .kb-key:active:not(:disabled) { transform: translateY(-1px); }
  .kb-key:disabled {
    opacity: .22;
    cursor: default;
    border-color: transparent;
    box-shadow: none;
  }
  .kb-key.correct-key {
    background: rgba(58,138,58,.25);
    border-color: #4a9f4a;
    color: #8edb8e;
    opacity: 1;
    text-shadow: 0 0 8px rgba(92,191,92,.4);
  }
  .kb-key.wrong-key {
    background: rgba(176,48,32,.2);
    border-color: var(--red);
    color: var(--red);
    opacity: 1;
  }

  /* ── New Word button ── */
  .btn-new {
    padding: 11px 36px;
    background: transparent;
    border: 1px solid var(--gold-dim);
    border-radius: 4px;
    color: var(--gold);
    font-family: 'Cinzel', serif;
    font-size: .95rem;
    font-weight: 600;
    letter-spacing: .15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background .2s, color .2s, border-color .2s, box-shadow .2s, transform .1s;
    position: relative;
    overflow: hidden;
  }
  .btn-new::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(212,162,48,.08) 0%, transparent 100%);
    pointer-events: none;
  }
  .btn-new:hover {
    background: var(--gold);
    border-color: var(--glow);
    color: var(--ink);
    box-shadow: 0 0 24px rgba(212,162,48,.3);
    transform: translateY(-1px);
  }
  .btn-new:active { transform: translateY(0); }

  /* ── Footer credit ── */
  .credit {
    margin-top: 36px;
    text-align: center;
    color: var(--gold-dim);
    font-family: 'Cinzel', serif;
    font-size: .72rem;
    letter-spacing: .22em;
    text-transform: uppercase;
    opacity: .65;
    animation: glimmer 5s ease-in-out infinite;
  }
  .credit span {
    color: var(--gold);
    opacity: .9;
  }

  .shake { animation: shake .4s ease; }
</style>
</head>
<body>

<div class="title-wrap">
  <h1>Hangman</h1>
  <div class="title-rule"></div>
</div>

<div class="game-wrap">
  <!-- Left: gallows + lives -->
  <div class="gallows-panel">
    <canvas id="gallows" width="210" height="230"></canvas>
    <div class="lives-row" id="heartsRow"></div>
  </div>

  <!-- Right: hint, word, wrongs, keyboard -->
  <div class="right-panel">
    <div class="hint-text" id="hintText"></div>
    <div class="word-display" id="wordDisplay"></div>
    <div class="wrong-section">
      <div class="wrong-label">Wrong Guesses</div>
      <div class="wrong-letters" id="wrongLetters">&nbsp;</div>
    </div>
    <div id="messageArea"></div>
    <div class="keyboard" id="keyboard"></div>
    <button class="btn-new" onclick="newGame()">New Word</button>
  </div>
</div>

<div class="credit">Made with care by <span>Hansel</span></div>

<script>
const WORDS = [
  { word: "CABINET", hint: "Where you store dishes or files" },
  { word: "CAPTAIN", hint: "Leader of a ship or team" },
  { word: "CHICKEN", hint: "Farm bird, also a meal" },
  { word: "DIAMOND", hint: "Precious stone, or a card suit" },
  { word: "ELEMENT", hint: "Building block of matter" },
  { word: "FACTORY", hint: "Where things are manufactured" },
  { word: "FANTASY", hint: "Imaginative fiction genre" },
  { word: "GARBAGE", hint: "Trash or rubbish" },
  { word: "GRANITE", hint: "Hard igneous rock" },
  { word: "HARVEST", hint: "Gathering of crops" },
  { word: "HEALTHY", hint: "In good physical condition" },
  { word: "HISTORY", hint: "The study of past events" },
  { word: "JOURNEY", hint: "A long trip or adventure" },
  { word: "KITCHEN", hint: "Room where food is cooked" },
  { word: "LANTERN", hint: "Portable light source" },
  { word: "LIBRARY", hint: "Place full of books" },
  { word: "MACHINE", hint: "A mechanical device" },
  { word: "MORNING", hint: "The early part of the day" },
  { word: "MYSTERY", hint: "Something unknown or secret" },
  { word: "NATURAL", hint: "Found in nature" },
  { word: "NETWORK", hint: "A system of connected things" },
  { word: "NOTHING", hint: "Not anything at all" },
  { word: "ANOTHER", hint: "One more; an additional one" },
  { word: "OPINION", hint: "A personal point of view" },
  { word: "OUTSIDE", hint: "Beyond the walls or borders" },
  { word: "PACKAGE", hint: "A wrapped parcel or bundle" },
  { word: "PAINTED", hint: "Covered with color or pigment" },
  { word: "PERFECT", hint: "Without any flaws" },
  { word: "PICTURE", hint: "A drawing or photograph" },
  { word: "PIONEER", hint: "An early settler or trailblazer" },
  { word: "PIRATES", hint: "Sea robbers of legend" },
  { word: "PLASTIC", hint: "A synthetic moldable material" },
  { word: "PLAYING", hint: "Engaging in a game or sport" },
  { word: "POPULAR", hint: "Liked by many people" },
  { word: "POSSESS", hint: "To own or have something" },
  { word: "POSTMAN", hint: "One who delivers letters" },
  { word: "PRESENT", hint: "A gift, or being here now" },
  { word: "PROBLEM", hint: "A difficult situation to solve" },
  { word: "PROTECT", hint: "To keep something safe" },
  { word: "PUMPKIN", hint: "Orange Halloween squash" },
  { word: "PYRAMID", hint: "Ancient Egyptian structure" },
  { word: "QUIETLY", hint: "Without making much noise" },
  { word: "RAINBOW", hint: "Colorful arc after rain" },
  { word: "REALIZE", hint: "To become aware of something" },
  { word: "REVENGE", hint: "Retaliation for a wrong done" },
  { word: "ROUTINE", hint: "A regular sequence of actions" },
  { word: "SCIENCE", hint: "The study of the natural world" },
  { word: "SHELTER", hint: "Protection from the weather" },
  { word: "SINGING", hint: "Producing musical sounds with voice" },
  { word: "SOLDIER", hint: "A person in the military" },
  { word: "STOMACH", hint: "Organ that digests food" },
  { word: "STRANGE", hint: "Unusual or peculiar" },
  { word: "STUDENT", hint: "Someone who is learning" },
  { word: "SUBJECT", hint: "A topic studied in school" },
  { word: "SUNRISE", hint: "Dawn, the start of day" },
  { word: "SURFACE", hint: "The outside or top layer" },
  { word: "SUSPEND", hint: "To hang or temporarily stop" },
  { word: "THUNDER", hint: "Loud sound during a storm" },
  { word: "TONIGHT", hint: "This evening" },
  { word: "TRAFFIC", hint: "Vehicles moving on roads" },
  { word: "TROUBLE", hint: "Difficulty or a problematic situation" },
  { word: "TSUNAMI", hint: "Massive ocean wave from earthquake" },
  { word: "TURMOIL", hint: "A state of confusion or disorder" },
  { word: "TWINKLE", hint: "To shine with a flickering light" },
  { word: "UNIFORM", hint: "A set of standard clothing" },
  { word: "UNUSUAL", hint: "Not common or typical" },
  { word: "VILLAGE", hint: "A small settlement" },
  { word: "VOLCANO", hint: "A mountain that erupts lava" },
  { word: "WARRIOR", hint: "A brave fighter or soldier" },
  { word: "WEATHER", hint: "Atmospheric conditions outside" },
  { word: "WEDDING", hint: "A marriage ceremony" },
  { word: "WESTERN", hint: "Relating to the west" },
  { word: "WHISPER", hint: "To speak very softly" },
  { word: "WINDOWS", hint: "Glass panes in a wall" },
  { word: "WITNESS", hint: "Someone who sees an event" },
  { word: "WONDERS", hint: "Marvels that inspire awe" },
  { word: "YOUNGER", hint: "Less old in age" },
  { word: "JEALOUS", hint: "Feeling envy toward someone" },
  { word: "JUMPING", hint: "Leaping off the ground" },
  { word: "BALANCE", hint: "Steady, equal distribution of weight" },
  { word: "BLANKET", hint: "Warm covering for a bed" },
  { word: "BROTHER", hint: "A male sibling" },
  { word: "CAMPING", hint: "Sleeping outdoors in a tent" },
  { word: "CANDIES", hint: "Sweet confections" },
  { word: "CAPTURE", hint: "To catch or seize something" },
  { word: "CARTOON", hint: "Animated show or comic drawing" },
];

const WORD_BANK = WORDS.filter(w => w.word.length === 7);
const MAX_WRONG = 7;
const KB_ROWS = ["QWERTYUIOP", "ASDFGHJKL", "ZXCVBNM"];

let secret = "", hint = "", guessed = new Set(), wrongCount = 0, gameOver = false;
let lastGuessedCorrect = new Set();

// ── Canvas ──
const canvas = document.getElementById("gallows");
const ctx = canvas.getContext("2d");

function drawGallows(wrong) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Subtle wood grain texture via shadow
  ctx.shadowBlur = 0;

  // Gallows structure
  ctx.strokeStyle = "#6b4a1a";
  ctx.lineWidth = 4;
  ctx.lineCap = "round";
  ctx.lineJoin = "round";

  // Base
  ctx.beginPath(); ctx.moveTo(20,220); ctx.lineTo(190,220); ctx.stroke();
  // Pole
  ctx.beginPath(); ctx.moveTo(65,220); ctx.lineTo(65,22); ctx.stroke();
  // Brace diagonal
  ctx.lineWidth = 2.5;
  ctx.strokeStyle = "#5a3a10";
  ctx.beginPath(); ctx.moveTo(65,60); ctx.lineTo(90,22); ctx.stroke();
  // Top bar
  ctx.strokeStyle = "#6b4a1a";
  ctx.lineWidth = 4;
  ctx.beginPath(); ctx.moveTo(65,22); ctx.lineTo(148,22); ctx.stroke();
  // Rope
  ctx.strokeStyle = "#9a7a28";
  ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.moveTo(148,22); ctx.lineTo(148,56); ctx.stroke();

  // Person parts
  ctx.shadowBlur = wrong >= 7 ? 8 : 0;
  ctx.shadowColor = "#b03020";
  ctx.strokeStyle = "#b03020";
  ctx.fillStyle   = "#b03020";
  ctx.lineWidth = 3;

  if (wrong >= 1) { // Head
    ctx.beginPath();
    ctx.arc(148, 72, 16, 0, Math.PI*2);
    ctx.stroke();
  }
  if (wrong >= 2) { // Body
    ctx.beginPath(); ctx.moveTo(148,88); ctx.lineTo(148,150); ctx.stroke();
  }
  if (wrong >= 3) { // Left arm
    ctx.beginPath(); ctx.moveTo(148,104); ctx.lineTo(116,130); ctx.stroke();
  }
  if (wrong >= 4) { // Right arm
    ctx.beginPath(); ctx.moveTo(148,104); ctx.lineTo(180,130); ctx.stroke();
  }
  if (wrong >= 5) { // Left leg
    ctx.beginPath(); ctx.moveTo(148,150); ctx.lineTo(116,188); ctx.stroke();
  }
  if (wrong >= 6) { // Right leg
    ctx.beginPath(); ctx.moveTo(148,150); ctx.lineTo(180,188); ctx.stroke();
  }
  if (wrong >= 7) { // X eyes + sad mouth
    ctx.lineWidth = 2.2;
    [[141,66],[141,70],[145,66],[145,70]].forEach(([x,y],i) => {
      if(i===0||i===3) { ctx.beginPath(); ctx.moveTo(x,66); ctx.lineTo(x+4,70); ctx.stroke(); }
      if(i===1||i===2) { ctx.beginPath(); ctx.moveTo(x,66); ctx.lineTo(x-4,70); ctx.stroke(); }
    });
    // Sad arc
    ctx.beginPath();
    ctx.arc(148, 78, 7, 0.1*Math.PI, 0.9*Math.PI, true);
    ctx.stroke();
  }

  ctx.shadowBlur = 0;
}

// ── Render ──
function renderWord() {
  const wd = document.getElementById("wordDisplay");
  wd.innerHTML = "";
  for (const ch of secret) {
    const slot = document.createElement("div");
    slot.className = "letter-slot";
    const charEl = document.createElement("span");
    charEl.className = "char";
    if (guessed.has(ch)) {
      charEl.textContent = ch;
      if (lastGuessedCorrect.has(ch)) charEl.classList.add("just-guessed");
    } else if (gameOver) {
      charEl.textContent = ch;
      charEl.classList.add("wrong");
    }
    slot.appendChild(charEl);
    slot.appendChild(document.createElement("hr"));
    wd.appendChild(slot);
  }
}

function renderWrong() {
  const wl = document.getElementById("wrongLetters");
  const wrong = [...guessed].filter(c => !secret.includes(c));
  wl.textContent = wrong.length ? wrong.join("  ") : "\u00a0";
}

function renderHearts() {
  const row = document.getElementById("heartsRow");
  row.innerHTML = "";
  for (let i = 0; i < MAX_WRONG; i++) {
    const h = document.createElement("span");
    h.className = "heart" + (i < wrongCount ? " lost" : "");
    h.textContent = "❤️";
    row.appendChild(h);
  }
}

function renderKeyboard() {
  const kb = document.getElementById("keyboard");
  kb.innerHTML = "";
  for (const row of KB_ROWS) {
    const rowEl = document.createElement("div");
    rowEl.className = "kb-row";
    for (const ch of row) {
      const btn = document.createElement("button");
      btn.className = "kb-key";
      btn.id = "key-" + ch;
      btn.textContent = ch;
      btn.onclick = () => guess(ch);
      if (guessed.has(ch)) {
        btn.disabled = true;
        btn.classList.add(secret.includes(ch) ? "correct-key" : "wrong-key");
      }
      rowEl.appendChild(btn);
    }
    kb.appendChild(rowEl);
  }
}

// ── Logic ──
function guess(ch) {
  if (gameOver || guessed.has(ch)) return;
  lastGuessedCorrect.clear();
  guessed.add(ch);

  if (!secret.includes(ch)) {
    wrongCount++;
    const panel = document.querySelector(".gallows-panel");
    panel.classList.remove("shake");
    void panel.offsetWidth;
    panel.classList.add("shake");
  } else {
    lastGuessedCorrect.add(ch);
  }

  drawGallows(wrongCount);
  renderWord();
  renderWrong();
  renderHearts();
  renderKeyboard();
  checkEnd();
}

function checkEnd() {
  const won  = [...secret].every(c => guessed.has(c));
  const lost = wrongCount >= MAX_WRONG;
  const msg  = document.getElementById("messageArea");

  if (won) {
    gameOver = true;
    msg.innerHTML = '<div class="message win">✦ You got it! ✦</div>';
    disableAll();
  } else if (lost) {
    gameOver = true;
    renderWord();
    msg.innerHTML = `<div class="message lose">☠ The word was: <strong>${secret}</strong></div>`;
    disableAll();
  } else {
    msg.innerHTML = "";
  }
}

function disableAll() {
  document.querySelectorAll(".kb-key").forEach(b => b.disabled = true);
}

function newGame() {
  const pick = WORD_BANK[Math.floor(Math.random() * WORD_BANK.length)];
  secret = pick.word; hint = pick.hint;
  guessed = new Set(); lastGuessedCorrect = new Set();
  wrongCount = 0; gameOver = false;

  document.getElementById("messageArea").innerHTML = "";
  document.getElementById("hintText").textContent = "Hint: " + hint;

  drawGallows(0);
  renderWord();
  renderWrong();
  renderHearts();
  renderKeyboard();
}

document.addEventListener("keydown", e => {
  const ch = e.key.toUpperCase();
  if (/^[A-Z]$/.test(ch)) guess(ch);
});

newGame();
</script>
</body>
</html>
